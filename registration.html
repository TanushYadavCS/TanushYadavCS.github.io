<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv=""X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Register | Attendance Management System</title>
  <link
    href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="registrationStyle.css" />
</head>
<body>
  <div class="wrapper">
    <form action="">
      <h1>Register</h1>
      <div class="input-box">
        <input type="text" placeholder="Name" required />
        <i class="bx bxs-user"></i>
      </div>
      <div class="input-box">
        <input type="text" placeholder="Organization email" required />
        <i class="bx bxs-envelope"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Create a password" required />
        <i class="bx bxs-lock-alt"></i>
      </div>
      <h4>I am a:</h4>
      <div class="button-container">
        <button type="button" class="btn1">Teacher</button>
        <button type="button" class="btn1">Student</button>
      </div>
      <button type="submit" class="btn2">Register</button>
    </form>
  </div>
</body>
